<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enhanced Product Sales Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 80px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 30px; }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

    .data-status {
      position: fixed; top: 10px; left: 10px;
      background: rgba(40, 167, 69, 0.9); color: white;
      padding: 8px 16px; border-radius: 20px; font-size: 12px;
      z-index: 1001; transition: all 0.3s ease;
    }
    .data-status.error { background: rgba(220, 53, 69, 0.9); }
    .data-status.loading { background: rgba(255, 193, 7, 0.9); color: #000; }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    @media (min-width: 768px) { .stats-bar { grid-template-columns: repeat(5, 1fr); } }

    .stat-card {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
      border-radius: 15px; padding: 20px; text-align: center; color: white;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex; flex-direction: column; justify-content: center; min-height: 100px;
    }
    .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .stat-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
    .stat-label { font-size: 0.9rem; opacity: 0.9; font-weight: 500; }

    .controls-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }

    .floating-add-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: linear-gradient(45deg, #c6ff6bff, #ff8e8e);
      color: white; border: none; padding: 16px 20px; border-radius: 50px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4); transition: all 0.3s ease;
      z-index: 1000; display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .floating-add-btn:hover { transform: translateY(-3px) scale(1.05); }
    .floating-add-btn:active { transform: translateY(-1px) scale(1.02); }

    .view-all-chart-btn {
      background: linear-gradient(45deg, #ffc107, #fd7e14); color: white; border: none;
      padding: 12px 24px; border-radius: 25px; font-size: 16px; cursor: pointer;
      transition: all 0.3s ease;
    }
    .view-all-chart-btn:hover { transform: translateY(-2px); }

    .search-filter {
      flex: 1; min-width: 200px; padding: 12px 16px; border: none;
      border-radius: 25px; font-size: 16px;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }

    .product-card {
      background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      padding: 25px; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .product-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }

    .image-section {
      position: relative; width: 100%; height: 250px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 15px; overflow: hidden; margin-bottom: 20px;
    }
    .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
    .product-image:hover { transform: scale(1.05); }

    .product-name-overlay {
      position: absolute; top: 15px; left: 15px;
      background: rgba(102, 126, 234, 0.9); color: white;
      padding: 8px 16px; border-radius: 20px; font-weight: 600; backdrop-filter: blur(10px);
    }
    .product-cost-overlay {
      position: absolute; top: 15px; right: 100px;
      background: rgba(255, 193, 7, 0.9); color: black;
      padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: 600;
    }
    .edit-menu-btn {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255,255,255,0.9); border: none; border-radius: 50%;
      width: 40px; height: 40px; cursor: pointer; font-size: 18px;
      transition: all 0.3s ease;
    }
    .edit-menu-btn:hover { background: white; transform: rotate(90deg); }

    .dropdown-menu {
      display: none; position: absolute; top: 60px; right: 15px;
      background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-radius: 10px; padding: 10px 0; z-index: 10; min-width: 180px;
    }
    .dropdown-menu.show { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      display: block; width: 100%; padding: 12px 20px; border: none;
      background: none; text-align: left; cursor: pointer; transition: background 0.2s ease; font-size: 14px;
    }
    .dropdown-item:hover { background: #f8f9fa; }

    .form-section { display: grid; gap: 20px; }
    .input-group { position: relative; }
    .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    .input-row { display: flex; gap: 10px; align-items: center; }

    .form-input {
      flex: 1; padding: 12px 16px; border: 2px solid #e9ecef;
      border-radius: 10px; font-size: 16px; transition: all 0.3s ease;
    }
    .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
    .form-input:disabled { background: #f8f9fa; cursor: not-allowed; }
    .form-input.error { border-color: #dc3545; }

    .toggle-btn {
      background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s ease;
    }
    .toggle-btn:hover { transform: translateY(-1px); }

    .total-display {
      background: linear-gradient(135deg, #9ed7d7ff, #e1cef4ff); color: black;
      padding: 15px; border-radius: 10px; font-size: 18px; font-weight: 600; text-align: center;
    }
    .profit-display {
      background: linear-gradient(135deg, #28a745, #20c997); color: white;
      padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600;
      text-align: center; margin-top: 10px;
    }

    .action-buttons { display: flex; gap: 15px; margin-top: 20px; }
    .submit-btn {
      flex: 1; background: linear-gradient(45deg, #28a745, #20c997); color: white; border: none;
      padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .submit-btn:hover { transform: translateY(-2px); }

    .chart-btn {
      background: linear-gradient(45deg, #17a2b8, #20c997); color: white; border: none;
      padding: 12px 16px; border-radius: 10px; font-size: 20px; cursor: pointer; transition: all 0.3s ease;
    }
    .chart-btn:hover { transform: translateY(-2px); }

    .delete-btn {
      position: absolute; top: 15px; right: 60px;
      background: rgba(220, 53, 69, 0.9); color: white; border: none;
      border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
      font-size: 16px; transition: all 0.3s ease;
    }
    .delete-btn:hover { background: rgba(220, 53, 69, 1); transform: scale(1.1); }

    .modal {
      display: none; position: fixed; z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
    }
    .modal.show { display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
    .modal-content {
      background: white; padding: 30px; border-radius: 20px;
      width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto;
      position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 24px; font-weight: 600; color: #333; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
    .close-btn:hover { color: #333; }

    .filter-controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .filter-select { padding: 8px 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 14px; }

    .download-btn {
      background: linear-gradient(45deg, #28a745, #20c997); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s ease;
    }

    .error-message { color: #dc3545; font-size: 14px; margin-top: 5px; }

    .no-results {
      text-align: center; font-size: 18px; margin: 50px 0; padding: 40px;
      background: rgba(255,255,255,0.1); border-radius: 20px; color: white;
    }

    .toast {
      position: fixed; top: 20px; right: 20px; color: white;
      padding: 15px 25px; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 2000;
      transform: translateX(400px); transition: transform 0.3s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast-success { background: linear-gradient(45deg, #28a745, #20c997); }
    .toast-error { background: linear-gradient(45deg, #dc3545, #fd7e14); }

    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top: 2px solid transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.8); }
    }

    #scrollTopBtn {
      position: fixed; bottom: 80px; right: 20px;
      background: linear-gradient(45deg, #125b9fff, #af9bf7ff);
      color: white; border: none; padding: 16px; border-radius: 6px;
      cursor: pointer; z-index: 999; display: none; transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
      .products-grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="data-status" id="dataStatus">Connecting...</div>
  <div class="container">
    <div class="header">
      <h1>Enhanced Product Sales Manager</h1>
      <p>Manage your products, track sales, and monitor analytics</p>
    </div>

    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="totalProducts">—</div><div class="stat-label">Total Products</div></div>
      <div class="stat-card"><div class="stat-value" id="totalSales">—</div><div class="stat-label">Total Sales</div></div>
      <div class="stat-card"><div class="stat-value" id="grossRevenue">—</div><div class="stat-label">Gross Revenue</div></div>
      <div class="stat-card"><div class="stat-value" id="netRevenue">—</div><div class="stat-label">Net Revenue</div></div>
      <div class="stat-card"><div class="stat-value" id="itemsSoldToday">—</div><div class="stat-label">Items Sold Today</div></div>
    </div>

    <div class="controls-bar">
      <input type="text" class="search-filter" id="searchFilter" placeholder="🔍 Search products..." oninput="filterProducts(this.value)">
      <button class="view-all-chart-btn" onclick="openChart(null)">📊 View All Charts</button>
    </div>

    <div class="products-grid" id="productsGrid"></div>
    <div class="no-results" id="noResults" style="display: none;">No products found matching your search.</div>
  </div>

  <button class="floating-add-btn" onclick="addProduct()" title="Add New Product">➕ Add Product</button>

  <!-- Chart Modal -->
  <div class="modal" id="chartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="chartTitle">Sales Chart</h2>
        <button class="close-btn" onclick="closeChart()">&times;</button>
      </div>
      <div class="filter-controls">
        <label for="timeFilter">Filter by:</label>
        <select class="filter-select" id="timeFilter" onchange="updateChart()">
          <option value="day">Daily</option>
          <option value="week">Weekly</option>
          <option value="month">Monthly</option>
        </select>
        <button class="download-btn" onclick="downloadExcel()">📥 Download Excel</button>
      </div>
      <canvas id="salesChart"></canvas>
    </div>
  </div>

  <div class="toast" id="toast"><span id="toastMessage"></span></div>
  <button id="scrollTopBtn" title="Go to top">▲</button>

  <script>
    // ─── Configuration ────────────────────────────────────────────────────────
    const API_BASE = 'http://localhost:5000/api';

    let products = [];
    let salesData = [];
    let currentChart = null;
    let currentProductId = 1;

    // ─── API Helpers ──────────────────────────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message || 'Request failed');
      return json;
    }

    function updateDataStatus(status, msg) {
      const el = document.getElementById('dataStatus');
      el.textContent = msg || (status === 'success' ? '✅ Connected to MongoDB' : status === 'loading' ? '⏳ Syncing...' : '❌ API Error');
      el.className = 'data-status' + (status === 'error' ? ' error' : status === 'loading' ? ' loading' : '');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `toast toast-${type} show`;
      document.getElementById('toastMessage').textContent = message;
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    // ─── Load All Data ────────────────────────────────────────────────────────
    async function loadData() {
      updateDataStatus('loading');
      try {
        const [prodRes, statsRes, salesRes] = await Promise.all([
          apiFetch('/products'),
          apiFetch('/sales/stats'),
          apiFetch('/sales'),
        ]);
        products = prodRes.data;
        salesData = salesRes.data.map(s => ({ ...s, date: new Date(s.date) }));
        document.getElementById('productsGrid').innerHTML = '';
        products.forEach(p => renderProduct(p));
        applyStats(statsRes.data);
        updateDataStatus('success');
      } catch (err) {
        updateDataStatus('error', '❌ Cannot reach backend');
        showToast('Cannot connect to backend. Is the server running?', 'error');
        console.error(err);
      }
    }

    function applyStats(data) {
      document.getElementById('totalProducts').textContent = data.totalProducts;
      document.getElementById('totalSales').textContent = data.totalSalesCount;
      document.getElementById('grossRevenue').textContent = data.grossRevenue.toFixed(2);
      document.getElementById('netRevenue').textContent = data.netRevenue.toFixed(2);
      document.getElementById('itemsSoldToday').textContent = data.itemsSoldToday;
    }

    async function refreshStats() {
      try {
        const statsRes = await apiFetch('/sales/stats');
        applyStats(statsRes.data);
      } catch (err) { /* silent */ }
    }

    window.onload = loadData;

    // ─── Product CRUD ─────────────────────────────────────────────────────────
    async function addProduct() {
      updateDataStatus('loading');
      try {
        const res = await apiFetch('/products', {
          method: 'POST',
          body: JSON.stringify({
            name: `Product ${Date.now()}`,
            image: 'https://via.placeholder.com/400x250?text=No+Image',
            price: 0, cost: 0, priceLocked: false,
          }),
        });
        const product = res.data;
        products.push(product);
        renderProduct(product);
        await refreshStats();
        updateDataStatus('success');
        showToast(`${product.name} added successfully!`);
      } catch (err) {
        updateDataStatus('error');
        showToast('Failed to add product: ' + err.message, 'error');
      }
    }

    function renderProduct(product) {
      const grid = document.getElementById('productsGrid');
      const card = document.createElement('div');
      card.className = 'product-card';
      card.id = `product-${product._id}`;
      card.innerHTML = `
        <div class="image-section">
          <img class="product-image" src="${product.image}" alt="" onerror="this.src='https://via.placeholder.com/400x250/f8f9fa/6c757d?text=Image+Not+Found'">
          <div class="product-name-overlay">${product.name}</div>
          <div class="product-cost-overlay" id="cost-${product._id}">Cost: ${(product.cost||0).toFixed(2)}</div>
          <button class="delete-btn" onclick="deleteProduct('${product._id}')" title="Delete">🗑️</button>
          <button class="edit-menu-btn" onclick="toggleMenu('${product._id}')">⚙️</button>
          <div class="dropdown-menu" id="menu-${product._id}">
            <button class="dropdown-item" onclick="changeImage('${product._id}')">📷 Change Image</button>
            <button class="dropdown-item" onclick="removeImage('${product._id}')">🚫 Remove Image</button>
            <button class="dropdown-item" onclick="editName('${product._id}')">✏️ Edit Name</button>
            <button class="dropdown-item" onclick="editProductCost('${product._id}')">💰 Edit Cost</button>
          </div>
          <input type="file" id="fileInput-${product._id}" accept="image/*" style="display:none;" onchange="handleImageUpload('${product._id}', this)">
        </div>
        <div class="form-section">
          <div class="input-group">
            <label>Price</label>
            <div class="input-row">
              <input type="number" class="form-input" id="price-${product._id}"
                     placeholder="Enter price" step="0.01" min="0" max="999999" value="${product.price}"
                     ${product.priceLocked ? 'disabled' : ''}>
              <button class="toggle-btn" id="priceToggle-${product._id}" onclick="togglePrice('${product._id}')">
                ${product.priceLocked ? 'Edit' : 'Set'}
              </button>
            </div>
            <div class="error-message" id="priceError-${product._id}"></div>
          </div>
          <div class="input-group">
            <label>Quantity</label>
            <input type="number" class="form-input" id="quantity-${product._id}"
                   placeholder="Enter quantity" min="1" max="99999" oninput="calculateTotal('${product._id}')">
          </div>
          <div class="total-display" id="total-${product._id}">Total: 0.00</div>
          <div class="profit-display" id="profit-${product._id}" style="display:none;">Net Profit: 0.00</div>
          <div class="action-buttons">
            <button class="submit-btn" id="submitBtn-${product._id}" onclick="submitSale('${product._id}')">Submit Sale</button>
            <button class="chart-btn" onclick="openChart('${product._id}')" title="View Charts">📊</button>
          </div>
        </div>`;
      grid.appendChild(card);
      calculateTotal(product._id);
    }

    async function deleteProduct(productId) {
      const p = products.find(p => p._id === productId);
      if (!confirm(`Are you sure you want to delete "${p?.name}"?`)) return;
      try {
        await apiFetch(`/products/${productId}`, { method: 'DELETE' });
        const card = document.getElementById(`product-${productId}`);
        card.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => {
          card.remove();
          products = products.filter(p => p._id !== productId);
          salesData = salesData.filter(s => s.productId !== productId);
        }, 300);
        await refreshStats();
        showToast(`${p?.name} deleted successfully!`);
      } catch (err) {
        showToast('Failed to delete product: ' + err.message, 'error');
      }
    }

    // ─── Image Management ──────────────────────────────────────────────────────
    function changeImage(productId) {
      document.getElementById(`fileInput-${productId}`).click();
      toggleMenu(productId);
    }

    function handleImageUpload(productId, input) {
      const file = input.files[0];
      if (!file || !file.type.startsWith('image/')) { showToast('Please select a valid image file', 'error'); return; }
      if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB', 'error'); return; }
      const reader = new FileReader();
      reader.onload = async e => {
        const imageData = e.target.result;
        document.querySelector(`#product-${productId} .product-image`).src = imageData;
        try {
          await apiFetch(`/products/${productId}/image`, { method: 'PATCH', body: JSON.stringify({ image: imageData }) });
          const p = products.find(p => p._id === productId);
          if (p) p.image = imageData;
          showToast('Image updated!');
        } catch (err) {
          showToast('Failed to save image: ' + err.message, 'error');
        }
      };
      reader.readAsDataURL(file);
    }

    async function removeImage(productId) {
      const src = 'https://via.placeholder.com/400x250?text=No+Image';
      document.querySelector(`#product-${productId} .product-image`).src = src;
      try {
        await apiFetch(`/products/${productId}/image`, { method: 'PATCH', body: JSON.stringify({ image: src }) });
        const p = products.find(p => p._id === productId);
        if (p) p.image = src;
      } catch (err) { /* silent */ }
      toggleMenu(productId);
      showToast('Image removed!');
    }

    // ─── Name / Cost Editing ──────────────────────────────────────────────────
    async function editName(productId) {
      const p = products.find(p => p._id === productId);
      const newName = prompt('Enter new product name (2–50 chars):', p.name);
      if (!newName || newName === p.name) return;
      if (newName.length < 2 || newName.length > 50) { showToast('Name must be 2–50 characters', 'error'); return; }
      try {
        await apiFetch(`/products/${productId}`, { method: 'PUT', body: JSON.stringify({ ...p, name: newName }) });
        document.querySelector(`#product-${productId} .product-name-overlay`).textContent = newName;
        p.name = newName;
        showToast('Name updated!');
      } catch (err) {
        showToast('Failed to update name: ' + err.message, 'error');
      }
      toggleMenu(productId);
    }

    async function editProductCost(productId) {
      const p = products.find(p => p._id === productId);
      const newCost = prompt('Enter product cost:', p.cost || 0);
      if (newCost === null || newCost === (p.cost || 0).toString()) return;
      const cost = parseFloat(newCost);
      if (isNaN(cost) || cost < 0 || cost > 999999) { showToast('Enter a valid cost (0 – 999,999)', 'error'); return; }
      try {
        await apiFetch(`/products/${productId}/cost`, { method: 'PATCH', body: JSON.stringify({ cost }) });
        p.cost = cost;
        document.getElementById(`cost-${productId}`).textContent = `Cost: ${cost.toFixed(2)}`;
        calculateTotal(productId);
        showToast('Cost updated!');
      } catch (err) {
        showToast('Failed to update cost: ' + err.message, 'error');
      }
      toggleMenu(productId);
    }

    // ─── Price Toggle ─────────────────────────────────────────────────────────
    async function togglePrice(productId) {
      const priceInput = document.getElementById(`price-${productId}`);
      const toggleBtn = document.getElementById(`priceToggle-${productId}`);
      const p = products.find(p => p._id === productId);
      if (!p) return;

      if (!p.priceLocked) {
        const price = parseFloat(priceInput.value);
        if (isNaN(price) || price <= 0 || price > 999999) {
          priceInput.classList.add('error');
          document.getElementById(`priceError-${productId}`).textContent = 'Enter a valid price (0.01 – 999,999)';
          return;
        }
        priceInput.classList.remove('error');
        document.getElementById(`priceError-${productId}`).textContent = '';
        try {
          await apiFetch(`/products/${productId}/price`, { method: 'PATCH', body: JSON.stringify({ price, priceLocked: true }) });
          p.price = price;
          p.priceLocked = true;
          priceInput.disabled = true;
          toggleBtn.textContent = 'Edit';
          calculateTotal(productId);
          showToast('Price set!');
        } catch (err) {
          showToast('Failed to set price: ' + err.message, 'error');
        }
      } else {
        try {
          await apiFetch(`/products/${productId}/price`, { method: 'PATCH', body: JSON.stringify({ price: p.price, priceLocked: false }) });
          p.priceLocked = false;
          priceInput.disabled = false;
          toggleBtn.textContent = 'Set';
          document.getElementById(`total-${productId}`).textContent = 'Total: 0.00';
          document.getElementById(`profit-${productId}`).style.display = 'none';
        } catch (err) {
          showToast('Failed to unlock price: ' + err.message, 'error');
        }
      }
    }

    function calculateTotal(productId) {
      const p = products.find(p => p._id === productId);
      if (!p || !p.priceLocked) return;
      const quantity = parseInt(document.getElementById(`quantity-${productId}`).value) || 0;
      const total = p.price * quantity;
      const netProfit = total - (p.cost || 0) * quantity;
      document.getElementById(`total-${productId}`).textContent = `Total: ${total.toFixed(2)}`;
      const profitDisplay = document.getElementById(`profit-${productId}`);
      if (quantity > 0) {
        profitDisplay.textContent = `Net Profit: ${netProfit.toFixed(2)}`;
        profitDisplay.style.display = 'block';
        profitDisplay.style.background = netProfit >= 0
          ? 'linear-gradient(135deg, #28a745, #20c997)'
          : 'linear-gradient(135deg, #dc3545, #fd7e14)';
      } else {
        profitDisplay.style.display = 'none';
      }
    }

    // ─── Submit Sale ──────────────────────────────────────────────────────────
    async function submitSale(productId) {
      const p = products.find(p => p._id === productId);
      const quantityInput = document.getElementById(`quantity-${productId}`);
      const quantity = parseInt(quantityInput.value);

      if (!p || !p.priceLocked || isNaN(quantity) || quantity <= 0 || quantity > 99999) {
        showToast('Set a price and enter a valid quantity (1–99,999)', 'error');
        return;
      }

      const btn = document.getElementById(`submitBtn-${productId}`);
      btn.innerHTML = '<span class="loading-spinner"></span> Saving...';
      btn.disabled = true;

      try {
        const res = await apiFetch('/sales', {
          method: 'POST',
          body: JSON.stringify({ productId, quantity }),
        });
        const sale = res.data;
        salesData.push({ ...sale, date: new Date(sale.date) });
        quantityInput.value = '';
        document.getElementById(`total-${productId}`).textContent = 'Total: 0.00';
        document.getElementById(`profit-${productId}`).style.display = 'none';
        await refreshStats();
        showToast(`Sale recorded: ${quantity} × ${p.name} (Profit: ${sale.netProfit.toFixed(2)})`);
      } catch (err) {
        showToast('Failed to record sale: ' + err.message, 'error');
      } finally {
        btn.textContent = 'Submit Sale';
        btn.disabled = false;
      }
    }

    // ─── Charts ───────────────────────────────────────────────────────────────
    async function openChart(productId) {
      currentProductId = productId;
      const p = productId ? products.find(p => p._id === productId) : null;
      document.getElementById('chartTitle').textContent = p ? `Sales Chart – ${p.name}` : 'Sales Chart – All Products';
      document.getElementById('chartModal').classList.add('show');

      // Refresh sales data from server for accurate chart
      try {
        const res = await apiFetch('/sales' + (productId ? `?productId=${productId}` : ''));
        salesData = res.data.map(s => ({ ...s, date: new Date(s.date) }));
      } catch (err) { /* use existing */ }

      setTimeout(() => updateChart(), 100);
    }

    function closeChart() {
      document.getElementById('chartModal').classList.remove('show');
      if (currentChart) { currentChart.destroy(); currentChart = null; }
    }

    function updateChart() {
      if (currentChart) currentChart.destroy();
      const filter = document.getElementById('timeFilter').value;
      const ctx = document.getElementById('salesChart').getContext('2d');
      const filteredData = currentProductId
        ? salesData.filter(s => s.productId === currentProductId || s.productId?._id === currentProductId)
        : salesData;

      if (!currentProductId) {
        const productSales = {};
        filteredData.forEach(s => {
          const name = s.productName;
          if (!productSales[name]) productSales[name] = { quantity: 0, revenue: 0 };
          productSales[name].quantity += s.quantity;
          productSales[name].revenue += s.total;
        });
        const labels = Object.keys(productSales);
        if (!labels.length) { ctx.canvas.parentElement.innerHTML += '<p style="text-align:center;color:#999;margin-top:20px">No sales data yet.</p>'; return; }
        currentChart = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [
            { label: 'Quantity Sold', data: labels.map(l => productSales[l].quantity), backgroundColor: 'rgba(102,126,234,0.8)', yAxisID: 'y' },
            { label: 'Revenue', data: labels.map(l => productSales[l].revenue), backgroundColor: 'rgba(118,75,162,0.8)', yAxisID: 'y1' }
          ]},
          options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: {
            y: { type: 'linear', position: 'left', beginAtZero: true, title: { display: true, text: 'Quantity' } },
            y1: { type: 'linear', position: 'right', beginAtZero: true, title: { display: true, text: 'Revenue' }, grid: { drawOnChartArea: false } }
          }}
        });
      } else {
        const grouped = groupSalesData(filteredData, filter);
        const labels = Object.keys(grouped).sort();
        currentChart = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [
            { label: 'Quantity Sold', data: labels.map(l => grouped[l].quantity), backgroundColor: 'rgba(102,126,234,0.8)', yAxisID: 'y' },
            { label: 'Revenue', data: labels.map(l => grouped[l].revenue), backgroundColor: 'rgba(118,75,162,0.8)', yAxisID: 'y1' }
          ]},
          options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: {
            y: { type: 'linear', position: 'left', beginAtZero: true, title: { display: true, text: 'Quantity' } },
            y1: { type: 'linear', position: 'right', beginAtZero: true, title: { display: true, text: 'Revenue' }, grid: { drawOnChartArea: false } }
          }}
        });
      }
    }

    function groupSalesData(data, filter) {
      const grouped = {};
      data.forEach(sale => {
        const date = new Date(sale.date);
        let key;
        if (filter === 'day') key = date.toISOString().split('T')[0];
        else if (filter === 'week') { const w = getWeekNumber(date); key = `${date.getFullYear()}-W${w.toString().padStart(2,'0')}`; }
        else key = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}`;
        if (!grouped[key]) grouped[key] = { quantity: 0, revenue: 0 };
        grouped[key].quantity += sale.quantity;
        grouped[key].revenue += sale.total;
      });
      return grouped;
    }

    function getWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    // ─── Excel Export ─────────────────────────────────────────────────────────
    function downloadExcel() {
      const filteredData = currentProductId
        ? salesData.filter(s => s.productId === currentProductId || s.productId?._id === currentProductId)
        : salesData;
      if (!filteredData.length) { showToast('No sales data to export', 'error'); return; }

      const rows = filteredData.map(sale => ({
        'Date': new Date(sale.date).toLocaleDateString(),
        'Time': new Date(sale.date).toLocaleTimeString(),
        'Product': sale.productName,
        'Quantity': sale.quantity,
        'Unit Price': sale.price.toFixed(2),
        'Unit Cost': (sale.cost||0).toFixed(2),
        'Unit Profit': (sale.price-(sale.cost||0)).toFixed(2),
        'Total Revenue': sale.total.toFixed(2),
        'Total Cost': ((sale.cost||0)*sale.quantity).toFixed(2),
        'Net Profit': sale.netProfit.toFixed(2),
      }));

      const totalRevenue = filteredData.reduce((s, r) => s + r.total, 0);
      const totalQty = filteredData.reduce((s, r) => s + r.quantity, 0);
      const totalCosts = filteredData.reduce((s, r) => s + (r.cost||0)*r.quantity, 0);
      rows.push({});
      rows.push({ Date:'', Time:'', Product:'TOTALS', Quantity: totalQty, 'Unit Price':'', 'Unit Cost':'', 'Unit Profit':'', 'Total Revenue': totalRevenue.toFixed(2), 'Total Cost': totalCosts.toFixed(2), 'Net Profit': (totalRevenue-totalCosts).toFixed(2) });

      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sales Report');
      XLSX.writeFile(wb, `sales_report_${new Date().toISOString().split('T')[0]}.xlsx`);
      showToast('Excel report downloaded!');
    }

    // ─── UI Helpers ───────────────────────────────────────────────────────────
    function toggleMenu(productId) {
      const menu = document.getElementById(`menu-${productId}`);
      document.querySelectorAll('.dropdown-menu').forEach(m => { if (m !== menu) m.classList.remove('show'); });
      menu.classList.toggle('show');
    }

    function filterProducts(searchTerm) {
      const cards = document.querySelectorAll('.product-card');
      let visibleCount = 0;
      cards.forEach(card => {
        const name = card.querySelector('.product-name-overlay').textContent.toLowerCase();
        const visible = name.includes(searchTerm.toLowerCase());
        card.style.display = visible ? 'block' : 'none';
        if (visible) visibleCount++;
      });
      document.getElementById('noResults').style.display = visibleCount === 0 && searchTerm ? 'block' : 'none';
    }

    // ─── Global Event Listeners ───────────────────────────────────────────────
    document.addEventListener('click', e => {
      if (!e.target.closest('.edit-menu-btn') && !e.target.closest('.dropdown-menu')) {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
      }
      if (e.target.classList.contains('modal')) closeChart();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeChart();
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); addProduct(); }
    });

    const scrollBtn = document.getElementById('scrollTopBtn');
    window.onscroll = () => { scrollBtn.style.display = window.scrollY > 200 ? 'block' : 'none'; };
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  </script>
</body>
